iris.features.optional = ENTITY_TRANSLUCENT

# ==========================================
# SLIDERY (Zmienne liczbowe)
# Dodano tutaj wszystkie parametry odpowiadające za intensywność, skalę, odległości itp.
# ==========================================
sliders = GLOBAL_PIXEL_SIZE DISTANCE_PIXEL_START DISTANCE_PIXEL_MAX_DIST DISTANCE_PIXEL_MAX_SIZE LIGHTNING_PIXELATION AURORA_PIXELATION WEATHER_DESATURATION WEATHER_VIGNETTE FOG_DENSITY_RAIN FOG_DENSITY_THUNDER LIGHTNING_FREQUENCY SUN_HALO_INTENSITY AURORA_SIZE AURORA_INTENSITY HEIGHT_HIGH HEIGHT_MID HEIGHT_LOW BLOCK_SIZE_HIGH BLOCK_SIZE_MID BLOCK_SIZE_LOW GLOBAL_SPEED INTENSYWNOSC_GWIAZD SKUPIENIE_ZORZY POKRYCIE_ZORZY INTENSYWNOSC_ZORZY ZASIEG_ZORZY PREDKOSC_ZORZY WATER_OPACITY CAUSTIC_SPEED CAUSTIC_SCALE CAUSTIC_INTENSITY CAUSTICS_SCALE CAUSTICS_SPEED CAUSTICS_SHARPNESS CAUSTICS_STRENGTH GALAXY_SCALE PARTICLE_DENSITY

# ==========================================
# MENU GŁÓWNE
# ==========================================
screen = <empty> <profile> <empty> [PIXELATION] [WEATHER] [SKY_AND_CLOUDS] [WATER] [NETHER] [END] [ADVANCED] *
screen.columns = 3

# ==========================================
# PODSTRONY (SUB-SCREENS)
# ==========================================

# --- PIKSELOZA ---
screen.PIXELATION = GLOBAL_PIXELATION_MODE GLOBAL_PIXEL_SIZE <empty> ENABLE_DISTANCE_PIXELATION DISTANCE_PIXEL_START DISTANCE_PIXEL_MAX_DIST DISTANCE_PIXEL_MAX_SIZE <empty> LIGHTNING_PIXELATION AURORA_PIXELATION PIXELATE_AURORA_COLORS
screen.PIXELATION.columns = 2

# --- POGODA ---
screen.WEATHER = LIGHTNING_FREQUENCY LIGHTNING_PIXELATION WEATHER_DESATURATION WEATHER_VIGNETTE FOG_DENSITY_RAIN FOG_DENSITY_THUNDER
screen.WEATHER.columns = 2

# --- NIEBO I CHMURY ---
screen.SKY_AND_CLOUDS = ENABLE_HIGH_CLOUDS HEIGHT_HIGH BLOCK_SIZE_HIGH ENABLE_MID_CLOUDS HEIGHT_MID BLOCK_SIZE_MID ENABLE_LOW_CLOUDS HEIGHT_LOW BLOCK_SIZE_LOW <empty> <empty> <empty> WLACZ_GWIAZDY INTENSYWNOSC_GWIAZD SUN_HALO_INTENSITY <empty> <empty> <empty> WLACZ_ZORZE ENABLE_AURORA PIXELATE_AURORA_COLORS SKUPIENIE_ZORZY POKRYCIE_ZORZY AURORA_PIXELATION INTENSYWNOSC_ZORZY ZASIEG_ZORZY PREDKOSC_ZORZY AURORA_SIZE AURORA_INTENSITY <empty>
screen.SKY_AND_CLOUDS.columns = 3

# --- WODA (OVERWORLD) ---
screen.WATER = WATER_STYLE WATER_OPACITY <empty> CAUSTIC_SPEED CAUSTIC_SCALE CAUSTIC_INTENSITY
screen.WATER.columns = 3

# --- NETHER (LAWA) ---
screen.NETHER = ENABLE_LAVA_CAUSTICS CAUSTICS_SCALE CAUSTICS_SPEED CAUSTICS_SHARPNESS CAUSTICS_STRENGTH
screen.NETHER.columns = 1

# --- END (KOSMOS) ---
screen.END = GALAXY_SCALE PARTICLE_DENSITY
screen.END.columns = 1

# --- ZAAWANSOWANE ---
screen.ADVANCED = GLOBAL_SPEED AUTO_LOD_DETECTION
screen.ADVANCED.columns = 1

# ==========================================
# PROFILE GRAFICZNE (PRESETS)
# ==========================================

# Gładki wygląd bez widocznych bloków (zwykły shader)
profile.MODERN = !ENABLE_DISTANCE_PIXELATION GLOBAL_PIXELATION_MODE=0 PIXELATE_AURORA_COLORS=0 LIGHTNING_PIXELATION=80.0 AURORA_PIXELATION=64.0

# Domyślny tryb, w którym piksele pojawiają się dopiero z oddaleniem (Voxy/DH)
profile.RETRO_LOD = ENABLE_DISTANCE_PIXELATION GLOBAL_PIXELATION_MODE=0 PIXELATE_AURORA_COLORS=1 LIGHTNING_PIXELATION=40.0 AURORA_PIXELATION=18.0 DISTANCE_PIXEL_START=48.0 DISTANCE_PIXEL_MAX_SIZE=12.0

# Surowy, globalny filtr w stylu PlayStation 1
profile.PS1_GLOBAL = !ENABLE_DISTANCE_PIXELATION GLOBAL_PIXELATION_MODE=1 GLOBAL_PIXEL_SIZE=4.0 PIXELATE_AURORA_COLORS=1 LIGHTNING_PIXELATION=20.0 AURORA_PIXELATION=8.0
